                flowIds.forEach(function(id) {
                    const flow = findWorkspaceById(id);
                    if (!folderConfig.flows[id]) { folderConfig.flows[id] = { id: id, name: flow ? getLabel(flow) : id, path: storedPath(flow ? getPath(flow) : ''), createdAt: nowIso(), updatedAt: nowIso() }; }
                    folderConfig.flows[id].color = color;
                    folderConfig.flows[id].icon = icon || DEFAULT_FLOW_ICON;
                    folderConfig.flows[id].updatedAt = nowIso();
                });
                subflowIds.forEach(function(id) {
                    const subflow = findSubflowById(id);
                    if (!folderConfig.subflows[id]) { folderConfig.subflows[id] = { id: id, name: subflow ? getLabel(subflow) : id, path: storedPath(subflow ? getItemPath('subflow', subflow) : ''), createdAt: nowIso(), updatedAt: nowIso() }; }
                    folderConfig.subflows[id].color = color;
                    folderConfig.subflows[id].icon = icon || DEFAULT_FLOW_ICON;
                    folderConfig.subflows[id].updatedAt = nowIso();
                });
                saveConfigNow();
                $(this).dialog('destroy').remove();
                render();
                forceInfoPanelUpdate();
            } }
        ], close: function(){ dialog.remove(); } });
    }

    function updateFooterButtons() {
        const hasDeleteSelection = !!selected && (selected.type === 'flow' || selected.type === 'folder');
        const hasStyleSelection = !!selected && (selected.type === 'flow' || selected.type === 'folder' || selected.type === 'subflow' || selected.type === 'subflow-folder');
        if (footerDeleteButton) { footerDeleteButton.toggle(hasDeleteSelection).prop('disabled', !hasDeleteSelection).toggleClass('disabled', !hasDeleteSelection); }
        if (footerFolderStyleButton) { footerFolderStyleButton.toggle(hasStyleSelection).prop('disabled', !hasStyleSelection).toggleClass('disabled', !hasStyleSelection); }
    }

    function clearExplorerSelection() {
        selected = null;
        selectedKeys = new Set();
        lastRangeAnchor = null;
        updateFooterButtons();
        updateInfoPanel();
        render();
    }

    function getFilterLabel() {
        const labels = { all: 'All', flows: 'Flows', subflows: 'Subflows', shown: 'Shown', hidden: 'Hidden', enabled: 'Enabled', disabled: 'Disabled', locked: 'Locked', unlocked: 'Unlocked' };
        return labels[filterMode] || 'All';
    }

    function updateHeaderLabels() {
        if (headerFilterButton) { headerFilterButton.find('span').text(getFilterLabel()); }
        if (headerSortButton) {
            const labels = { name: 'Name', created: 'Created', updated: 'Updated', type: 'Type' };
            headerSortButton.find('span').text(labels[sortMode] || 'Name');
        }
        if (headerSortDirButton) { headerSortDirButton.html(sortDir === 'desc' ? '<i class="fa fa-arrow-down"></i>' : '<i class="fa fa-arrow-up"></i>'); headerSortDirButton.attr('title', sortDir === 'desc' ? 'Descending' : 'Ascending'); }
    }

    function closeFoldersMenus() { $('.folders-menu').remove(); }

    function contextKey(context) {
        if (!context) { return ''; }
        if (context.type === 'folder') { return itemKey('folder', context.path); }
        if (context.type === 'flow') { return itemKey('flow', context.id); }
        if (context.type === 'subflow') { return itemKey('subflow', context.id); }
        return '';
    }

    function targetPathFromContext(context) {
        if (!context) { return ''; }
        if (context.type === 'folder') { return normalisePath(context.path); }
        if (context.type === 'flow') { return normalisePath(context.path); }
        if (context.type === 'subflow') { return normalisePath(context.path); }
        return normalisePath(context.path || '');
    }

    function forceSelectContext(context) {
        const key = contextKey(context);
        if (!key) { return; }
        selectedKeys = new Set([key]);
        setSelectedFromKey(key);
        lastRangeAnchor = key;
        updateFooterButtons();
        forceInfoPanelUpdate();
        render();
    }

    function openContextMenu(event, context) {
        closeFoldersMenus();
        forceSelectContext(context);
        const menu = $('<div>', { class: 'folders-menu folders-context-menu' }).appendTo('body');
        function add(label, icon, action, enabled, options) {
            if (enabled === false) { return; }
            options = options || {};
            $('<a>', { href: '#', class: options.danger ? 'folders-danger-action' : '' }).html('<span class="folders-menu-check">' + (icon ? '<i class="' + esc(icon) + '"></i>' : '') + '</span><span>' + esc(label) + '</span>').appendTo(menu).on('click', function(e) {
                e.preventDefault();
                closeFoldersMenus();
                action();
            });
        }
        function addNewSubmenu(enabled) {
            if (!enabled) { return; }
            const wrap = $('<div>', { class: 'folders-submenu-wrap' }).appendTo(menu);
            $('<a>', { href: '#', class: 'folders-submenu-toggle' }).html('<span class="folders-menu-check">+</span><span>New</span>').appendTo(wrap).on('click', function(e) { e.preventDefault(); });
            const sub = $('<div>', { class: 'folders-menu folders-submenu' }).appendTo(wrap);
            [
                ['Folder', '<i class="fa fa-folder folders-menu-folder-icon"></i>', function() { createFolderHere(basePath); }],
                ['Flow', '<i class="' + esc(DEFAULT_FLOW_ICON) + ' folders-footer-flow-icon"></i>', function() { createFlowHere(basePath); }]
            ].forEach(function(item) {
                $('<a>', { href: '#' }).html('<span class="folders-menu-check">' + item[1] + '</span><span>' + esc(item[0]) + '</span>').appendTo(sub).on('click', function(e) {
                    e.preventDefault();
                    closeFoldersMenus();
                    item[2]();
                });
            });
        }
        const basePath = targetPathFromContext(context);
        addNewSubmenu(context.type === 'workspace' || context.type === 'folder' || context.type === 'flow' || context.type === 'subflow');
        add('Rename', 'fa fa-pencil', function() {
            if (context.type === 'folder') { editingFolderPath = basePath; editingFolderOriginal = basePath; }
            if (context.type === 'flow') { editingItemKey = itemKey('flow', context.id); }
            if (context.type === 'subflow') { editingItemKey = itemKey('subflow', context.id); }
            render();
        }, context.type === 'folder' || context.type === 'flow' || context.type === 'subflow');
        add('Icon and colour', 'fa fa-tint', function() { openFolderStyleDialog(); }, context.type === 'folder' || context.type === 'flow' || context.type === 'subflow');
        add('Delete', 'fa fa-trash', function() {
            openDeleteDialog();
        }, context.type === 'folder' || context.type === 'flow', { danger: true });
        menu.css({ left: event.pageX, top: event.pageY });
    }

    function openHeaderMenu(anchor, mode) {
        const existing = $('.folders-header-menu[data-mode="' + mode + '"]');
        if (existing.length) {
            closeFoldersMenus();
            return;
        }
        closeFoldersMenus();
        const options = mode === 'sort' ? [ ['name','Name'], ['created','Created'], ['updated','Updated'], ['type','Type'] ] : [ ['all','All'], ['flows','Flows'], ['subflows','Subflows'], ['shown','Shown'], ['hidden','Hidden'], ['enabled','Enabled'], ['disabled','Disabled'], ['unlocked','Unlocked'], ['locked','Locked'] ];
        const current = mode === 'sort' ? sortMode : filterMode;
        const menu = $('<div>', { class: 'folders-menu folders-header-menu' }).attr('data-mode', mode).appendTo('body');
        options.forEach(function(item) {
            const row = $('<a>', { href: '#', class: item[0] === current ? 'selected' : '' }).html('<span class="folders-menu-check">' + (item[0] === current ? '<i class="fa fa-check folders-menu-check-icon"></i>' : '') + '</span><span>' + esc(item[1]) + '</span>').appendTo(menu);
            row.on('click', function(e) {
                e.preventDefault();
                if (mode === 'sort') { sortMode = item[0]; }
                else { filterMode = item[0]; }
                saveLocalState();
                updateHeaderLabels();
                closeFoldersMenus();
                render();
            });
        });
        const pos = anchor.offset();
        menu.css({ left: pos.left, top: pos.top + anchor.outerHeight() + 2 });
    }

    function setFlowExplorerSidebarIcon(icon) {
        try {
            const target = $(icon);
            if (!target || !target.length) { return; }
            target.attr('class', 'red-ui-sidebar-tab-icon fa fa-folder folders-explorer-tab-icon');
            target.removeAttr('style');
            target.css({ 'mask-image': 'none', '-webkit-mask-image': 'none' });
            const button = target.closest('button');
            if (button && button.length && (button.hasClass('selected') || button.hasClass('active') || button.hasClass('red-ui-sidebar-tab-selected'))) {
                target.css('color', '#fff');
            } else {
                target.css('color', '');
            }
        } catch (err) {}
    }

    function fixSidebarIcon() {
        try {
            setFlowExplorerSidebarIcon($('button[data-tab-id="' + SIDEBAR_ID + '"] i').first());
            $('.red-ui-sidebar-banner').each(function() {
                const banner = $(this);
                if ($.trim(banner.find('.red-ui-sidebar-banner-label').text()) !== 'EXPLORER') { return; }
                const holder = banner.find('.red-ui-sidebar-banner-icon').first();
                holder.addClass('folders-sidebar-banner-icon');
                let icon = holder.find('i').first();
                if (!icon.length) {
                    icon = $('<i>').appendTo(holder.empty());
                }
                setFlowExplorerSidebarIcon(icon);
            });
        } catch (err) {}
    }

    function initEvents() {
        try {
            if (RED.events && typeof RED.events.on === 'function') {
                ['flows:loaded', 'flows:change', 'flows:add', 'flows:remove', 'workspace:change', 'workspace:add', 'workspace:remove', 'nodes:add', 'nodes:remove', 'nodes:change', 'deploy'].forEach(eventName => RED.events.on(eventName, function() {
                    if (eventName === 'flows:loaded') { setTimeout(loadConfig, 50); return; }
                    if (eventName.indexOf('workspace:') === 0) { syncSelectedToWorkspace(); }
                    setTimeout(function() { syncStoreFromWorkspaces(false); render(); }, 50);
                }));
            }
        } catch (err) {}
    }

    function init() {
        installStyles();
        if (!window.RED || !RED.sidebar) { setTimeout(init, 250); return; }
        if (RED.sidebar.containsTab && RED.sidebar.containsTab(SIDEBAR_ID)) { return; }
        loadLocalState();
        root = $('<div>', { class: 'folders-explorer' });
        outline = $('<div>', { class: 'red-ui-info-outline' }).appendTo(root);
        const toolbar = $('<div>', { class: 'red-ui-info-toolbar red-ui-palette-search' }).appendTo(outline);
        const searchBox = $('<div class="red-ui-searchBox-container red-ui-searchBox-has-options"><i class="fa fa-search"></i><form class="red-ui-searchBox-form"><input type="text" data-i18n="[placeholder]menu.label.search" class="red-ui-searchBox-input" placeholder="Search flows"></form><a class="red-ui-searchBox-clear" href="#" aria-label="clear all"><i class="fa fa-times"></i></a><span class="red-ui-searchBox-resultCount hide"></span></div>').appendTo(toolbar);
        const form = searchBox.find('form');
        searchInput = searchBox.find('input');
        const clear = searchBox.find('.red-ui-searchBox-clear');
        const tools = $('<div>', { class: 'red-ui-sidebar-header folders-header' }).appendTo(outline);
        const filterGroup = $('<span>', { class: 'button-group' }).appendTo(tools);
        headerFilterButton = $('<a>', { href: '#', class: 'red-ui-button red-ui-button-small folders-header-control folders-filter-button', title: 'Filter flows' }).html('<i class="fa fa-filter"></i> <span></span> <i class="fa fa-caret-down"></i>').appendTo(filterGroup);
        const sortGroup = $('<span>', { class: 'button-group' }).appendTo(tools);
        headerSortButton = $('<a>', { href: '#', class: 'red-ui-button red-ui-button-small folders-header-control folders-sort-button', title: 'Sort workspace' }).html('<i class="fa fa-sort"></i> <span></span> <i class="fa fa-caret-down"></i>').appendTo(sortGroup);
        const dirGroup = $('<span>', { class: 'button-group folders-dir-group' }).appendTo(tools);
        headerSortDirButton = $('<a>', { href: '#', class: 'red-ui-button red-ui-button-small folders-header-control folders-sort-dir', title: 'Reverse sort' }).html(sortDir === 'desc' ? '<i class="fa fa-sort-alpha-desc"></i>' : '<i class="fa fa-sort-alpha-asc"></i>').appendTo(dirGroup);
        sortDirButton = headerSortDirButton;
        updateHeaderLabels();
        const treeWrap = $('<div>', { class: 'red-ui-treeList', tabindex: 0 }).appendTo(outline);
        const treeContainer = $('<div>', { class: 'red-ui-treeList-container' }).appendTo(treeWrap);
        const editList = $('<div>', { class: 'red-ui-editableList' }).appendTo(treeContainer);
        const borderList = $('<div>', { class: 'red-ui-editableList-border red-ui-editableList-container' }).appendTo(editList);
        tree = $('<ol>', { class: 'red-ui-treeList-list red-ui-editableList-list' }).appendTo(borderList);
        bindDropTarget(treeWrap, '');
        root.on('mousedown', function() {
            explorerHasFocus = true;
        });
        treeWrap.on('click', function(e) {
            if ($(e.target).closest('.red-ui-treeList-label,button,input,a,.folders-menu').length) { return; }
            explorerHasFocus = true;
            clearExplorerSelection();
        });
        treeWrap.on('contextmenu', function(e) {
            if ($(e.target).closest('.red-ui-treeList-label,button,input,a,.folders-menu').length) { return; }
            e.preventDefault();
            explorerHasFocus = true;
            clearExplorerSelection();
            openContextMenu(e, { type: 'workspace', path: '' });
        });
        form.on('submit', function(e) { e.preventDefault(); });
        searchInput.on('input', function() { searchBox.toggleClass('has-value', !!searchInput.val()); render(); });
        clear.on('click', function(e) { e.preventDefault(); searchInput.val(''); searchBox.removeClass('has-value'); render(); searchInput.trigger('focus'); });
        headerFilterButton.on('click', function(e){ e.preventDefault(); openHeaderMenu(headerFilterButton, 'filter'); });
        headerSortButton.on('click', function(e){ e.preventDefault(); openHeaderMenu(headerSortButton, 'sort'); });
        sortDirButton.on('click', function(e){ e.preventDefault(); sortDir = sortDir === 'asc' ? 'desc' : 'asc'; saveLocalState(); updateHeaderLabels(); render(); });
        $(document).on('mousedown.folders-menu', function(e){ if (!$(e.target).closest('.folders-menu,.folders-header').length) { closeFoldersMenus(); } });
        $(document).on('mousedown.folders-selection', function(e) {
            if ($(e.target).closest('.folders-explorer,.folders-menu,.ui-dialog').length) { return; }
            explorerHasFocus = false;
            if (selected) { clearExplorerSelection(); }
        });
        $(document).on('keydown.folders-delete', function(e) {
            const tag = String(e.target && e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select' || $(e.target).closest('.ui-dialog').length) { return; }
            if (!explorerHasFocus) { return; }
            if (e.key === 'Delete' || e.key === 'Backspace' || e.which === 46 || e.which === 8) {
                if (selected && (selected.type === 'folder' || selected.type === 'flow')) {
                    e.preventDefault();
                    openDeleteDialog();
                }
            }
        });
        const footer = $('<div>', { class: 'folders-footer' }).appendTo(root);
        const footerLeft = $('<div>', { class: 'folders-footer-left' }).appendTo(footer);
        $('<button>', { type: 'button', class: 'red-ui-button red-ui-button-small', title: 'New folder' }).html('<i class="fa fa-plus" style="font-size:9px;margin-right:2px"></i><i class="fa fa-folder"></i>').appendTo(footerLeft).on('click', function(e){ e.preventDefault(); createFolderHere(); });
        $('<button>', { type: 'button', class: 'red-ui-button red-ui-button-small', title: 'New flow' }).html('<i class="fa fa-plus" style="font-size:9px;margin-right:2px"></i><i class="red-ui-icons red-ui-icons-flow folders-footer-flow-icon"></i>').appendTo(footerLeft).on('click', function(e){ e.preventDefault(); createFlowHere(); });
        // Subflow creation is hidden until the native editor path is reliable.
        const footerRight = $('<div>', { class: 'folders-footer-right' }).appendTo(footer);
        footerFolderStyleButton = $('<button>', { type: 'button', class: 'red-ui-button red-ui-button-small', title: 'Icon and colour' }).html('<i class="fa fa-tint"></i>').appendTo(footerRight).on('click', function(e){ e.preventDefault(); openFolderStyleDialog(); });
        footerDeleteButton = $('<button>', { type: 'button', class: 'red-ui-button red-ui-button-small folders-danger', title: 'Delete' }).html('<i class="fa fa-trash"></i>').appendTo(footerRight).on('click', function(e){ e.preventDefault(); openDeleteDialog(); });
        updateFooterButtons();
        try { RED.actions.add('folders:show', function() { RED.sidebar.show(SIDEBAR_ID); setTimeout(fixSidebarIcon, 20); }); } catch (err) {}
        RED.sidebar.addTab({ id: SIDEBAR_ID, label: 'EXPLORER', name: 'Folders', iconClass: 'red-ui-sidebar-tab-icon fa fa-folder folders-explorer-tab-icon', content: root, action: 'folders:show' });
        $(document).on('click.folders-sidebar-icon', 'button[data-tab-id="' + SIDEBAR_ID + '"]', function(){ setTimeout(fixSidebarIcon, 0); setTimeout(fixSidebarIcon, 80); });
        fixSidebarIcon();
        setTimeout(fixSidebarIcon, 50);
        setTimeout(fixSidebarIcon, 300);
        setTimeout(fixSidebarIcon, 1000);
        initEvents();
        loadConfig();
        syncSelectedToWorkspace();
        activeFlowId = getCurrentWorkspaceId();
        setInterval(function(){
            const current = getCurrentWorkspaceId();
            if (current && current !== activeFlowId) {
                activeFlowId = current;
                const activeType = findSubflowById(current) ? 'subflow' : 'flow';
                selected = { type: activeType, id: current };
                selectedKeys = new Set([itemKey(activeType, current)]);
                render();
            }
        }, 350);
        setTimeout(render, 100); setTimeout(render, 750); setTimeout(render, 1500);
    }

    function start() {
        init();
    }

    function stop() {
        closeFoldersMenus();
    }

    if (window.RED && RED.plugins && typeof RED.plugins.registerPlugin === 'function') {
        RED.plugins.registerPlugin(PLUGIN_ID, {
            type: 'folders',
            name: 'Folders',
            onadd: start,
            onremove: stop
        });
    } else {
        $(start);
    }
})();
</script>
