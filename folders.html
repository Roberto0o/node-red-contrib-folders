<script type="text/javascript">
(function() {
    'use strict';

    const PLUGIN_ID = 'folders';
    const SIDEBAR_ID = 'folders-sidebar';
    const STYLE_ID = 'folders-style-1-0';
    const GLOBAL_CONFIG_TYPE = 'global-config';
    const GLOBAL_ENV_NAME = 'folders';
    const VERSION = '1.0.15';
    const LOCAL_STATE_KEY = 'node-red-contrib-folders.uiState';
    const DEFAULT_FLOW_ICON = 'red-ui-icons red-ui-icons-flow';
    const DEFAULT_FOLDER_ICON = 'fa fa-folder';

    let root;
    let outline;
    let tree;
    let searchInput;
    let filterSelect;
    let sortDirButton;
    let selected = null;
    let selectedKeys = new Set();
    let activeFlowId = null;
    let editingFolderPath = null;
    let editingFolderOriginal = null;
    let editingItemKey = null;
    let sortDir = 'asc';
    let sortMode = 'name';
    let filterMode = 'all';
    const collapsed = new Set();
    let dragState = null;
    let footerDeleteButton;
    let headerFilterButton;
    let headerSortButton;
    let headerSortDirButton;
    let footerFolderStyleButton;
    let explorerHasFocus = false;
    let visibleOrder = [];
    let lastRangeAnchor = null;
    let folderConfig = { version: 1, folders: {}, flows: {}, subflowFolders: {}, subflows: {}, updatedAt: '' };
    let configLoaded = false;
    let configSaveTimer = null;

    function esc(value) {
        return $('<div>').text(value === undefined || value === null ? '' : String(value)).html();
    }

    function notify(message, type) {
        try {
            if (RED && RED.notify) {
                RED.notify(message, { type: type || 'success', timeout: 2500 });
                return;
            }
        } catch (err) {}
        console.log('[folders]', message);
    }

    function loadLocalState() {
        try {
            const state = JSON.parse(localStorage.getItem(LOCAL_STATE_KEY) || '{}');
            if (state.sortMode) { sortMode = state.sortMode; }
            if (state.sortDir === 'asc' || state.sortDir === 'desc') { sortDir = state.sortDir; }
            if (state.filterMode) { filterMode = state.filterMode; }
            collapsed.clear();
            (Array.isArray(state.collapsed) ? state.collapsed : []).forEach(function(key) {
                if (key) { collapsed.add(String(key)); }
            });
        } catch (err) {}
    }

    function saveLocalState() {
        try {
            localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify({
                sortMode: sortMode,
                sortDir: sortDir,
                filterMode: filterMode,
                collapsed: Array.from(collapsed)
            }));
        } catch (err) {}
    }

    function installStyles() {
        if (document.getElementById(STYLE_ID)) { return; }
        if (!document.getElementById('folders-fontawesome-6')) {
            const fa = document.createElement('link');
            fa.id = 'folders-fontawesome-6';
            fa.rel = 'stylesheet';
            fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css';
            document.head.appendChild(fa);
            const shim = document.createElement('link');
            shim.id = 'folders-fontawesome-6-shims';
            shim.rel = 'stylesheet';
            shim.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/v4-shims.min.css';
            document.head.appendChild(shim);
        }
        const style = document.createElement('link');
        style.id = STYLE_ID;
        style.rel = 'stylesheet';
        style.href = './resources/node-red-contrib-folders/folders.css';
        document.head.appendChild(style);
    }

    function normalisePath(raw) {
        if (raw === undefined || raw === null) { return ''; }
        return String(raw).trim().replace(/\\+/g, '/').replace(/\/+/g, '/').replace(/^\/+/, '').replace(/\/+$/, '').split('/').map(part => part.trim()).filter(part => part && part !== '.' && part !== '..').join('/');
    }

    function ensureEnv(node) {
        if (!node || typeof node !== 'object') { return []; }
        if (!Array.isArray(node.env)) { node.env = []; }
        return node.env;
    }

    function getEnv(node, name) {
        const env = Array.isArray(node && node.env) ? node.env : [];
        const item = env.find(function(entry) { return entry && entry.name === name; });
        return item ? item.value : '';
    }

    function nowIso() { return new Date().toISOString(); }

    function cleanFolderList(value) {
        if (!Array.isArray(value)) { return []; }
        return Array.from(new Set(value.map(normalisePath).filter(Boolean))).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    }

    function makeIdSafe() {
        try { if (RED.nodes && typeof RED.nodes.id === 'function') { return RED.nodes.id(); } } catch (err) {}
        return (Math.random().toString(16).slice(2) + Date.now().toString(16)).slice(0, 16);
    }

    function storedPath(path) {
        const clean = normalisePath(path);
        return clean ? '/' + clean : '/';
    }

    function eachGlobalConfigCandidate(callback) {
        try { if (RED.nodes && typeof RED.nodes.eachConfig === 'function') { RED.nodes.eachConfig(function(node) { if (node && node.type === GLOBAL_CONFIG_TYPE) { callback(node); } }); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.type === GLOBAL_CONFIG_TYPE) { callback(node); } }); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.filterNodes === 'function') { (RED.nodes.filterNodes({ type: GLOBAL_CONFIG_TYPE }) || []).forEach(callback); } } catch (err) {}
    }

    function collectGlobalConfigNodes() {
        const nodes = [];
        const seen = new Set();
        eachGlobalConfigCandidate(function(node) {
            if (!node || node.type !== GLOBAL_CONFIG_TYPE || seen.has(node)) { return; }
            seen.add(node);
            ensureEnv(node);
            if (!node.modules || typeof node.modules !== 'object') { node.modules = {}; }
            nodes.push(node);
        });
        return nodes;
    }

    function getGlobalEnvPayload(node) {
        const raw = String(getEnv(node, GLOBAL_ENV_NAME) || '').trim();
        if (!raw) { return null; }
        try { return JSON.parse(raw); }
        catch (err) {
            console.warn('[folders] Invalid global environment variable "folders". Using empty config.', err);
            return null;
        }
    }

    function findGlobalConfigNode() {
        const nodes = collectGlobalConfigNodes();
        return nodes.find(function(node) { return !!getEnv(node, GLOBAL_ENV_NAME); }) || nodes[0] || null;
    }

    function attachGlobalConfigNode(node) {
        let added = false;
        try { if (RED.nodes && typeof RED.nodes.add === 'function') { RED.nodes.add(node); added = true; } } catch (err) { console.warn('[folders] RED.nodes.add(global-config) failed', err); }
        try { if (RED.nodes && typeof RED.nodes.addConfig === 'function') { RED.nodes.addConfig(node); added = true; } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.registerConfigNode === 'function') { RED.nodes.registerConfigNode(node); added = true; } } catch (err) {}
        try { if (RED.events && typeof RED.events.emit === 'function') { RED.events.emit('nodes:add', node); RED.events.emit('nodes:change', node); RED.events.emit('flows:change', node); } } catch (err) {}
        markDirty(node);
        return added;
    }

    function getOrCreateGlobalConfigNode() {
        let node = findGlobalConfigNode();
        if (!node) {
            node = {
                id: makeIdSafe(),
                type: GLOBAL_CONFIG_TYPE,
                env: [],
                modules: {}
            };
            attachGlobalConfigNode(node);
        }
        ensureEnv(node);
        if (!node.modules || typeof node.modules !== 'object') { node.modules = {}; }
        return node;
    }

    function readGlobalFoldersConfig() {
        const nodes = collectGlobalConfigNodes();
        for (let i = 0; i < nodes.length; i++) {
            const parsed = getGlobalEnvPayload(nodes[i]);
            if (parsed) { return parsed; }
        }
        return { version: 1, folders: {}, flows: {}, subflowFolders: {}, subflows: {}, updatedAt: '' };
    }

    function setGlobalEnvPayload(node, payload) {
        if (!node) { return; }
        ensureEnv(node);
        let item = node.env.find(function(entry) { return entry && entry.name === GLOBAL_ENV_NAME; });
        if (!item) {
            item = { name: GLOBAL_ENV_NAME, value: '', type: 'json' };
            node.env.push(item);
        }
        item.name = GLOBAL_ENV_NAME;
        item.type = 'json';
        item.value = JSON.stringify(payload);
        if (!node.modules || typeof node.modules !== 'object') { node.modules = {}; }
        try { node.changed = true; } catch (err) {}
    }

    function writeGlobalFoldersConfig(value) {
        const clean = normaliseConfig(value);
        const payload = {
            version: 1,
            updatedAt: nowIso(),
            folders: {},
            flows: {},
            subflowFolders: {},
            subflows: {}
        };
        Object.keys(clean.folders).sort().forEach(function(path) {
            const input = clean.folders[path];
            payload.folders[storedPath(path)] = {
                path: storedPath(path),
                name: input.name || path.split('/').pop(),
                parent: input.parent || storedPath(path.split('/').slice(0, -1).join('/')),
                icon: input.icon || DEFAULT_FOLDER_ICON,
                color: input.color || '',
                createdAt: input.createdAt || nowIso(),
                updatedAt: input.updatedAt || nowIso(),
                folders: input.folders || [],
                files: input.files || []
            };
        });
        Object.keys(clean.flows).sort().forEach(function(id) {
            const input = clean.flows[id];
            payload.flows[id] = {
                id: id,
                name: input.name || '',
                path: storedPath(input.path),
                icon: input.icon || '',
                color: input.color || '',
                createdAt: input.createdAt || input.updatedAt || nowIso(),
                updatedAt: input.updatedAt || nowIso()
            };
        });
        Object.keys(clean.subflowFolders).sort().forEach(function(path) {
            const input = clean.subflowFolders[path];
            payload.subflowFolders[storedPath(path)] = {
                path: storedPath(path),
                name: input.name || path.split('/').pop(),
                parent: input.parent || storedPath(path.split('/').slice(0, -1).join('/')),
                icon: input.icon || DEFAULT_FOLDER_ICON,
                color: input.color || '',
                createdAt: input.createdAt || nowIso(),
                updatedAt: input.updatedAt || nowIso(),
                folders: input.folders || [],
                files: input.files || []
            };
        });
        Object.keys(clean.subflows).sort().forEach(function(id) {
            const input = clean.subflows[id];
            payload.subflows[id] = {
                id: id,
                name: input.name || '',
                path: storedPath(input.path),
                icon: input.icon || '',
                color: input.color || '',
                createdAt: input.createdAt || input.updatedAt || nowIso(),
                updatedAt: input.updatedAt || nowIso()
            };
        });
        const primary = getOrCreateGlobalConfigNode();
        setGlobalEnvPayload(primary, payload);
        markDirty(primary);
        try { if (RED.events && typeof RED.events.emit === 'function') { RED.events.emit('nodes:change', primary); RED.events.emit('flows:change', primary); } } catch (err) {}
        return payload;
    }

    function readMeta(flow) {
        return { path: getPath(flow) };
    }

    function writeMeta(flow, patch) {
        if (!flow || !flow.id) { return; }
        folderConfig = normaliseConfig(folderConfig);
        const path = normalisePath((patch && Object.prototype.hasOwnProperty.call(patch, 'path')) ? patch.path : getPath(flow));
        folderConfig.flows[flow.id] = Object.assign({}, folderConfig.flows[flow.id] || {}, {
            id: flow.id,
            name: getLabel(flow),
            path: storedPath(path),
            icon: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].icon ? folderConfig.flows[flow.id].icon : '',
            color: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].color ? folderConfig.flows[flow.id].color : '',
            createdAt: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].createdAt ? folderConfig.flows[flow.id].createdAt : nowIso(),
            updatedAt: nowIso()
        });
        ensureFolderRecord(path);
        scheduleConfigSave();
    }

    function getPath(flow) {
        if (!flow || !flow.id) { return ''; }
        folderConfig = normaliseConfig(folderConfig);
        const entry = folderConfig.flows && folderConfig.flows[flow.id];
        if (entry && entry.path !== undefined && entry.path !== null) { return normalisePath(entry.path); }
        return '';
    }

    function flowReferences(id) {
        const refs = [];
        const seen = new Set();
        function add(ref) {
            if (!ref || typeof ref !== 'object' || !ref.id || ref.id !== id || seen.has(ref)) { return; }
            seen.add(ref);
            refs.push(ref);
        }
        add(findWorkspaceById(id));
        try { if (RED.nodes && typeof RED.nodes.node === 'function') { add(RED.nodes.node(id)); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.getNode === 'function') { add(RED.nodes.getNode(id)); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.id === id) { add(node); } }); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.eachWorkspace === 'function') { RED.nodes.eachWorkspace(function(workspace) { if (workspace && workspace.id === id) { add(workspace); } }); } } catch (err) {}
        try { if (RED.nodes && RED.nodes.workspaces) { if (Array.isArray(RED.nodes.workspaces)) { RED.nodes.workspaces.forEach(add); } else { add(RED.nodes.workspaces[id]); } } } catch (err) {}
        return refs;
    }

    function writeMetaEverywhere(flowOrId, patch) {
        const id = typeof flowOrId === 'string' ? flowOrId : flowOrId && flowOrId.id;
        if (!id) { return null; }
        const refs = flowReferences(id);
        const first = refs[0] || (typeof flowOrId === 'object' ? flowOrId : findWorkspaceById(id));
        if (first) { writeMeta(first, patch); }
        refs.forEach(function(ref) { try { ref.changed = true; } catch (err) {} });
        return first;
    }

    function getLabel(flow) { return (flow && (flow.label || flow.name || flow.id)) || 'Unnamed flow'; }

    function getInfo(flow) { return String((flow && (flow.info || flow.description)) || ''); }

    function findWorkspaceById(id) {
        if (!id || !RED || !RED.nodes) { return null; }
        const methods = ['workspace', 'getWorkspace', 'getWorkspaceById', 'node', 'getNode'];
        for (const method of methods) {
            try {
                if (typeof RED.nodes[method] === 'function') {
                    const found = RED.nodes[method](id);
                    if (found) { return found; }
                }
            } catch (err) {}
        }
        try {
            if (RED.nodes.workspaces) {
                if (Array.isArray(RED.nodes.workspaces)) { return RED.nodes.workspaces.find(workspace => workspace && workspace.id === id) || null; }
                return RED.nodes.workspaces[id] || null;
            }
        } catch (err) {}
        return null;
    }

    function getWorkspaces() {
        const result = [];
        const seen = new Set();
        function add(item) {
            try {
                let workspace = item;
                if (typeof item === 'string') { workspace = findWorkspaceById(item); }
                if (!workspace || !workspace.id || seen.has(workspace.id)) { return; }
                if (workspace.type && workspace.type !== 'tab') { return; }
                seen.add(workspace.id);
                result.push(workspace);
            } catch (err) {}
        }
        try { if (RED.nodes && typeof RED.nodes.eachWorkspace === 'function') { RED.nodes.eachWorkspace(add); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.getWorkspaceOrder === 'function') { (RED.nodes.getWorkspaceOrder() || []).forEach(add); } } catch (err) {}
        try { if (RED.nodes && RED.nodes.workspaces) { if (Array.isArray(RED.nodes.workspaces)) { RED.nodes.workspaces.forEach(add); } else { Object.keys(RED.nodes.workspaces).forEach(id => add(RED.nodes.workspaces[id] || id)); } } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.type === 'tab') { add(node); } }); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.filterNodes === 'function') { (RED.nodes.filterNodes({ type: 'tab' }) || []).forEach(add); } } catch (err) {}
        return result.sort(compareFlows);
    }

    function findSubflowById(id) {
        if (!id || !RED || !RED.nodes) { return null; }
        try { if (RED.nodes.subflow && typeof RED.nodes.subflow === 'function') { const sf = RED.nodes.subflow(id); if (sf) { return sf; } } } catch (err) {}
        try { if (RED.nodes.node && typeof RED.nodes.node === 'function') { const sf = RED.nodes.node(id); if (sf && sf.type === 'subflow') { return sf; } } } catch (err) {}
        try { if (RED.nodes.getNode && typeof RED.nodes.getNode === 'function') { const sf = RED.nodes.getNode(id); if (sf && sf.type === 'subflow') { return sf; } } } catch (err) {}
        return null;
    }

    function getSubflows(applySearch) {
        const result = [];
        const seen = new Set();
        function add(item) {
            try {
                if (!item || !item.id || seen.has(item.id)) { return; }
                if (item.type && item.type !== 'subflow') { return; }
                seen.add(item.id);
                result.push(item);
            } catch (err) {}
        }
        try { if (RED.nodes && typeof RED.nodes.eachSubflow === 'function') { RED.nodes.eachSubflow(add); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.type === 'subflow') { add(node); } }); } } catch (err) {}
        try { if (RED.nodes && typeof RED.nodes.filterNodes === 'function') { (RED.nodes.filterNodes({ type: 'subflow' }) || []).forEach(add); } } catch (err) {}
        try {
            if (RED.nodes && RED.nodes.subflows) {
                if (Array.isArray(RED.nodes.subflows)) { RED.nodes.subflows.forEach(add); }
                else { Object.keys(RED.nodes.subflows).forEach(id => add(RED.nodes.subflows[id] || findSubflowById(id))); }
            }
        } catch (err) {}
        if (applySearch === false) { return result.sort(compareFlows); }
        const q = String(searchInput ? searchInput.val() : '').trim().toLowerCase();
        return result.filter(sf => {
            const text = `${getLabel(sf)} ${sf.id || ''} ${getInfo(sf)}`.toLowerCase();
            return !q || text.indexOf(q) !== -1;
        }).sort(compareFlows);
    }

    function updateInfoPanel() {
        try {
            if (!selected || !RED.sidebar || !RED.sidebar.info || typeof RED.sidebar.info.refresh !== 'function') {
                return;
            }

            function injectInfoRows(rows) {
                function tryInject(attempt) {
                    try {
                        const panel = $('.red-ui-sidebar-info').first();
                        if (!panel.length) {
                            if (attempt < 5) {
                                setTimeout(function () { tryInject(attempt + 1); }, 50);
                            }
                            return;
                        }

                        let table = panel.find('table.red-ui-info-table').first();

                        if (!table.length) {
                            const scrollArea = panel.find('div').filter(function () {
                                const overflowY = String($(this).css('overflow-y') || '');
                                return overflowY === 'auto' || overflowY === 'scroll';
                            }).first();

                            table = $('<table class="red-ui-info-table"><tbody></tbody></table>');

                            if (scrollArea.length) {
                                scrollArea.prepend(table);
                            } else {
                                panel.append(table);
                            }
                        }

                        let tbody = table.find('tbody').first();
                        if (!tbody.length) {
                            tbody = $('<tbody></tbody>').appendTo(table);
                        }

                        tbody.find('tr.folders-info-extra-row').remove();

                        const flowRow = tbody.find('tr.red-ui-help-info-row').filter(function () {
                            return $.trim($(this).children('td').first().text()) === 'Flow';
                        }).first();

                        let anchor = flowRow.length ? flowRow : tbody.find('tr.red-ui-help-info-row').first();
                        rows.slice().reverse().forEach(function(rowData) {
                            const copyButton = rowData.copy ? '<button class="red-ui-button red-ui-button-small" type="button" title="Copy"><i class="fa fa-clipboard"></i></button>' : '';
                            const row = $(
                                '<tr class="red-ui-help-info-row folders-info-extra-row">' +
                                    '<td>' + esc(rowData.label) + '</td>' +
                                    '<td>' +
                                        '<span class="red-ui-debug-msg-element red-ui-debug-msg-top-level">' +
                                            '<span class="red-ui-debug-msg-row">' +
                                                (copyButton ? '<span class="red-ui-debug-msg-tools"><span class="red-ui-debug-msg-tools-copy button-group">' + copyButton + '</span></span>' : '') +
                                                '<span class="red-ui-debug-msg-object-value">' + rowData.html + '</span>' +
                                            '</span>' +
                                        '</span>' +
                                    '</td>' +
                                '</tr>'
                            );
                            if (rowData.copy) {
                                row.find('button').on('click', function (e) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    try {
                                        if (navigator.clipboard && navigator.clipboard.writeText) {
                                            navigator.clipboard.writeText(rowData.copy);
                                        }
                                    } catch (err) {}
                                });
                            }
                            if (anchor.length) { row.insertAfter(anchor); }
                            else { tbody.prepend(row); }
                        });
                    } catch (err) {
                        if (attempt < 5) {
                            setTimeout(function () { tryInject(attempt + 1); }, 50);
                        }
                    }
                }

                tryInject(0);
            }

            function stringValue(value) {
                return '<span class="red-ui-debug-msg-type-string red-ui-debug-msg-object-header">"' + esc(value || '') + '"</span>';
            }
            function numberValue(value) {
                return '<span class="red-ui-debug-msg-type-number">' + esc(value) + '</span>';
            }
            function iconValue(icon, color) {
                return stringValue(icon || '');
            }
            function colorValue(color) {
                return stringValue(color || '');
            }
            function applyInfoPanelStyle(icon, color, title, isSubflow) {
                setTimeout(function() {
                    try {
                        const panel = $('.red-ui-sidebar-info').first();
                        const header = panel.find('.red-ui-sidebar-header').first();
                        if (header.length) {
                            const label = header.children('span').filter(function() {
                                return !$(this).hasClass('button-group') && !$(this).find('.red-ui-node-icon-container').length;
                            }).first();
                            if (label.length && title) { label.text(title); }

                            const holder = header.find('.red-ui-node-icon-container').first();
                            if (holder.length && icon) {
                                holder.empty();
                                const nodeIcon = $('<div>', { class: 'red-ui-node-icon red-ui-palette-icon-flow' }).appendTo(holder);
                                const iconEl = $('<i>', { class: 'red-ui-palette-icon ' + icon }).appendTo(nodeIcon);
                                nodeIcon.css({ backgroundColor: '', borderColor: '' });
                                if (color) {
                                    if (String(icon || '').indexOf('red-ui-icons') !== -1) {
                                        iconEl.css({ color: '', backgroundColor: color });
                                    } else {
                                        iconEl.css({ color: color, backgroundColor: '' });
                                    }
                                }
                                if (isSubflow) { $('<span>', { class: 'folders-subflow-badge', title: 'Subflow' }).text('S').appendTo(holder.css('position', 'relative')); }
                            }
                        }

                        const titleIcons = panel.find('.red-ui-info-header i,.red-ui-sidebar-info-header i,.red-ui-info-title i,.red-ui-help-info-header i,.red-ui-info-header .red-ui-icons,.red-ui-sidebar-info-header .red-ui-icons');
                        const globalIcons = $('.red-ui-sidebar-info-header i,.red-ui-info-header i,.red-ui-help-info-header i').filter(':visible');
                        titleIcons.add(globalIcons).each(function() {
                            const titleIcon = $(this);
                            if (icon) {
                                titleIcon.attr('class', icon);
                                if (String(icon || '').indexOf('red-ui-icons') !== -1) {
                                    titleIcon.css({ color: '', backgroundColor: color || '' });
                                } else {
                                    titleIcon.css({ color: color || '', backgroundColor: '' });
                                }
                            }
                        });
                    } catch (err) {}
                }, 20);
            }
            function folderTotal(kind, path) {
                const clean = normalisePath(path);
                if (kind === 'all') { return folderTotal('flow', path) + folderTotal('subflow', path); }
                const items = kind === 'subflow' ? getSubflows(false) : getWorkspaces();
                return items.filter(function(item) {
                    const p = getItemPath(kind, item);
                    return p === clean || p.indexOf(clean + '/') === 0;
                }).length;
            }

            if (selected.type === 'folder') {
                const path = normalisePath(selected.path);
                const label = path.split('/').pop() || 'Folder';
                const meta = getFolderMetaForKind('flow', path);
                const record = folderStore('flow')[path] || {};
                RED.sidebar.info.refresh({
                    id: 'folders-folder:' + path,
                    type: 'folders-folder',
                    label: label,
                    name: label,
                    icon: meta.icon || DEFAULT_FOLDER_ICON,
                    color: meta.color || '',
                    info: ''
                });
                injectInfoRows([
                    { label: 'Directory', html: stringValue(storedPath(path)), copy: storedPath(path) },
                    { label: 'Created', html: stringValue(record.createdAt || '') },
                    { label: 'Updated', html: stringValue(record.updatedAt || '') },
                    { label: 'Items', html: numberValue(folderTotal('all', path)) },
                    { label: 'Icon', html: iconValue(meta.icon || DEFAULT_FOLDER_ICON, meta.color || '') },
                    { label: 'Colour', html: colorValue(meta.color || '') }
                ]);
                applyInfoPanelStyle(meta.icon || DEFAULT_FOLDER_ICON, meta.color || '', label, false);
            } else if (selected.type === 'subflow-folder') {
                const path = normalisePath(selected.path);
                const label = path.split('/').pop() || 'Folder';
                const meta = getFolderMetaForKind('subflow', path);
                const record = folderStore('subflow')[path] || {};
                RED.sidebar.info.refresh({
                    id: 'folders-subflow-folder:' + path,
                    type: 'folders-subflow-folder',
                    label: label,
                    name: label,
                    icon: meta.icon || DEFAULT_FOLDER_ICON,
                    color: meta.color || '',
                    info: ''
                });
                injectInfoRows([
                    { label: 'Directory', html: stringValue(storedPath(path)), copy: storedPath(path) },
                    { label: 'Created', html: stringValue(record.createdAt || '') },
                    { label: 'Updated', html: stringValue(record.updatedAt || '') },
                    { label: 'Subflows', html: numberValue(folderTotal('subflow', path)) },
                    { label: 'Icon', html: iconValue(meta.icon || DEFAULT_FOLDER_ICON, meta.color || '') },
                    { label: 'Colour', html: colorValue(meta.color || '') }
                ]);
                applyInfoPanelStyle(meta.icon || DEFAULT_FOLDER_ICON, meta.color || '', label, false);
            } else if (selected.type === 'flow') {
                const flow = findWorkspaceById(selected.id);
                if (flow) {
                    const meta = getItemMeta('flow', flow);
                    const record = itemStore('flow')[flow.id] || {};
                    RED.sidebar.info.refresh(flow);
                    injectInfoRows([
                        { label: 'Directory', html: stringValue(storedPath(getPath(flow))), copy: storedPath(getPath(flow)) },
                        { label: 'Created', html: stringValue(record.createdAt || '') },
                        { label: 'Updated', html: stringValue(record.updatedAt || '') },
                        { label: 'Icon', html: iconValue(meta.icon || DEFAULT_FLOW_ICON, meta.color || '') },
                        { label: 'Colour', html: colorValue(meta.color || '') }
                    ]);
                    applyInfoPanelStyle(meta.icon || DEFAULT_FLOW_ICON, meta.color || '', getLabel(flow), false);
                }
            } else if (selected.type === 'subflow') {
                const subflow = findSubflowById(selected.id);
                if (subflow) {
                    const meta = getItemMeta('subflow', subflow);
                    const record = itemStore('subflow')[subflow.id] || {};
                    RED.sidebar.info.refresh(subflow);
                    injectInfoRows([
                        { label: 'Directory', html: stringValue(storedPath(getItemPath('subflow', subflow))), copy: storedPath(getItemPath('subflow', subflow)) },
                        { label: 'Created', html: stringValue(record.createdAt || '') },
                        { label: 'Updated', html: stringValue(record.updatedAt || '') },
                        { label: 'Icon', html: iconValue(meta.icon || DEFAULT_FLOW_ICON, meta.color || '') },
                        { label: 'Colour', html: colorValue(meta.color || '') }
                    ]);
                    applyInfoPanelStyle(meta.icon || DEFAULT_FLOW_ICON, meta.color || '', getLabel(subflow), true);
                }
            }
        } catch (err) {}
    }

    function forceInfoPanelUpdate(times) {
        // The info sidebar redraws asynchronously, so folder rows need a few nudges.
        [0, 50, 150, 350, 700].slice(0, times || 5).forEach(function(delay) {
            setTimeout(updateInfoPanel, delay);
        });
    }

    function getCurrentWorkspaceId() {
        try { if (RED.workspaces && typeof RED.workspaces.active === 'function') { return RED.workspaces.active(); } if (RED.workspaces && RED.workspaces.activeWorkspace) { return RED.workspaces.activeWorkspace; } } catch (err) {}
        return null;
    }

    function showWorkspace(flowId) {
        try { if (RED.workspaces && typeof RED.workspaces.show === 'function') { RED.workspaces.show(flowId); return true; } } catch (err) {}
        try { if (RED.view && typeof RED.view.showWorkspace === 'function') { RED.view.showWorkspace(flowId); return true; } } catch (err) {}
        try { if (RED.actions && typeof RED.actions.invoke === 'function') { RED.actions.invoke('core:show-flow', flowId); return true; } } catch (err) {}
        try { const tab = $(`[data-workspace-id="${flowId}"], [data-id="${flowId}"]`).filter('.red-ui-workspace-tab,.red-ui-tabs-tab').first(); if (tab.length) { tab.trigger('click'); return true; } } catch (err) {}
        return false;
    }

    function openWorkspaceEditFromTab(flowId) {
        showWorkspace(flowId);
        setTimeout(function() {
            const targetHref = '#' + String(flowId || '');
            const tabLabel = $('a.red-ui-tab-label').filter(function() {
                return $(this).attr('href') === targetHref;
            }).first();
            if (!tabLabel.length) { return; }
            // Native dispatch matches the browser event the Node-RED tab code listens for.
            tabLabel[0].dispatchEvent(new MouseEvent('dblclick', {
                bubbles: true,
                cancelable: true,
                view: window
            }));
        }, 80);
    }

    function markDirty(flow) {
        try { if (RED.nodes && typeof RED.nodes.dirty === 'function') { RED.nodes.dirty(true); } } catch (err) {}
        if (flow && flow.id && flow.type) {
            try {
                if (RED.events && typeof RED.events.emit === 'function') {
                    RED.events.emit('flows:change', flow);
                    RED.events.emit('workspace:change', flow);
                }
            } catch (err) {}
        }
        try { if (RED.view && typeof RED.view.redraw === 'function') { RED.view.redraw(true); } } catch (err) {}
        try { if (RED.workspaces && typeof RED.workspaces.refresh === 'function') { RED.workspaces.refresh(); } } catch (err) {}
    }

    function boolProp(flow, names) {
        for (const name of names) { if (flow && flow[name] !== undefined) { return !!flow[name]; } }
        return false;
    }

    function setBoolProp(flow, names, value) {
        if (!flow) { return; }
        names.forEach(function(name) { flow[name] = !!value; });
    }

    function isHidden(flow) {
        if (!flow) { return false; }
        try { if (RED.workspaces && typeof RED.workspaces.isHidden === 'function') { return !!RED.workspaces.isHidden(flow.id); } } catch (err) {}
        try {
            const hiddenTabs = JSON.parse(RED.settings.getLocal('hiddenTabs') || '{}');
            return !!hiddenTabs[flow.id];
        } catch (err) {}
        return boolProp(flow, ['hidden', 'hide']);
    }

    function isDisabled(flow) { return boolProp(flow, ['disabled', 'disable']); }

    function isLocked(flow) { return boolProp(flow, ['locked', 'lock']); }

    function refreshAfterStateChange(flow) {
        try { if (RED.workspaces && typeof RED.workspaces.refresh === 'function') { RED.workspaces.refresh(); } } catch (err) {}
        try { if (RED.sidebar && RED.sidebar.info && typeof RED.sidebar.info.refresh === 'function') { RED.sidebar.info.refresh(flow); } } catch (err) {}
        setTimeout(render, 20);
        setTimeout(render, 180);
    }

    function toggleFlowState(flow, kind) {
        if (!flow) { return; }
        if ((flow.type === 'subflow' || flow._foldersKind === 'subflow') && kind !== 'hidden') { return; }
        try {
            if (kind === 'hidden') {
                if (isHidden(flow)) {
                    if (RED.workspaces && typeof RED.workspaces.show === 'function') { RED.workspaces.show(flow.id, null, true); }
                    else { setBoolProp(flow, ['hidden', 'hide'], false); markDirty(flow); }
                } else {
                    if (RED.workspaces && typeof RED.workspaces.hide === 'function') { RED.workspaces.hide(flow.id); }
                    else { setBoolProp(flow, ['hidden', 'hide'], true); markDirty(flow); }
                }
                refreshAfterStateChange(flow);
                return;
            }
            if (kind === 'disabled') {
                if (RED.workspaces && typeof RED.workspaces.enable === 'function' && typeof RED.workspaces.disable === 'function') {
                    isDisabled(flow) ? RED.workspaces.enable(flow.id) : RED.workspaces.disable(flow.id);
                } else {
                    setBoolProp(flow, ['disabled', 'disable'], !isDisabled(flow));
                    markDirty(flow);
                }
                refreshAfterStateChange(flow);
                return;
            }
            if (kind === 'locked') {
                if (RED.workspaces && typeof RED.workspaces.lock === 'function' && typeof RED.workspaces.unlock === 'function') {
                    isLocked(flow) ? RED.workspaces.unlock(flow.id) : RED.workspaces.lock(flow.id);
                } else {
                    setBoolProp(flow, ['locked', 'lock'], !isLocked(flow));
                    markDirty(flow);
                }
                refreshAfterStateChange(flow);
            }
        } catch (err) {
            console.warn('Folders state toggle failed', err);
            notify('Could not update flow state.', 'error');
        }
    }

    function syncSelectedToWorkspace() {
        if (selectedKeys && selectedKeys.size > 1) { return; }
        const activeId = getCurrentWorkspaceId();
        if (activeId) {
            const activeType = findSubflowById(activeId) ? 'subflow' : 'flow';
            selected = { type: activeType, id: activeId };
            selectedKeys = new Set([itemKey(activeType, activeId)]);
        }
    }

    function toggleCollapse(key, content, childList) {
        const willExpand = collapsed.has(key);
        if (willExpand) {
            collapsed.delete(key);
            if (content && content.length) { content.addClass('expanded').children('.red-ui-treeList-label').addClass('expanded'); }
            if (childList && childList.length) { childList.stop(true, true).slideDown(95); }
        } else {
            collapsed.add(key);
            if (content && content.length) { content.removeClass('expanded').children('.red-ui-treeList-label').removeClass('expanded'); }
            if (childList && childList.length) { childList.stop(true, true).slideUp(95); }
        }
        saveLocalState();
    }

    function iconHtml(iconClass) {
        const cls = iconClass || DEFAULT_FLOW_ICON;
        return `<i class="${esc(cls)}"></i>`;
    }

    function applyIconColor(icon, color) {
        if (!icon || !icon.length || !color) { return; }
        // Node-RED's default flow icon is mask-based, so it needs background-color.
        if (icon.hasClass('red-ui-icons') || String(icon.attr('class') || '').indexOf('red-ui-icons-flow') !== -1) {
            icon.css({ color: '', backgroundColor: color });
            return;
        }
        icon.css({ color: color, backgroundColor: 'transparent' });
    }

    function itemKey(type, id) { return type + ':' + (id || ''); }

    function setSelectedFromKey(key) {
        if (!key) { selected = null; return; }
        if (key.indexOf('flow:') === 0) { selected = { type: 'flow', id: key.slice(5) }; return; }
        if (key.indexOf('subflow-folder:') === 0) { selected = { type: 'subflow-folder', path: key.slice(15) }; return; }
        if (key.indexOf('subflow:') === 0) { selected = { type: 'subflow', id: key.slice(8) }; return; }
        if (key.indexOf('folder:') === 0) { selected = { type: 'folder', path: key.slice(7) }; return; }
        selected = null;
    }

    function selectItem(type, key, event) {
        const ik = itemKey(type, key);
        const ctrl = !!(event && (event.ctrlKey || event.metaKey));
        const shift = !!(event && event.shiftKey);
        const singleFolderSelected = type === 'folder' && !ctrl && !shift && selectedKeys.size === 1 && selectedKeys.has(ik);
        if (singleFolderSelected) {
            selectedKeys = new Set();
            selected = null;
            updateFooterButtons();
            updateInfoPanel();
            return;
        }
        if (shift && lastRangeAnchor && visibleOrder.indexOf(lastRangeAnchor) !== -1 && visibleOrder.indexOf(ik) !== -1) {
            const a = visibleOrder.indexOf(lastRangeAnchor);
            const b = visibleOrder.indexOf(ik);
            const from = Math.min(a, b);
            const to = Math.max(a, b);
            if (!ctrl) { selectedKeys = new Set(); }
            for (let i = from; i <= to; i++) { selectedKeys.add(visibleOrder[i]); }
        } else if (ctrl) {
            if (selectedKeys.has(ik)) { selectedKeys.delete(ik); }
            else { selectedKeys.add(ik); }
            lastRangeAnchor = ik;
        } else {
            selectedKeys = new Set([ik]);
            lastRangeAnchor = ik;
        }
        const first = selectedKeys.values().next();
        if (first.done) { selected = null; }
        else { setSelectedFromKey(first.value); }
        updateFooterButtons();
        updateInfoPanel();
    }

    function isItemSelected(type, key) {
        return selectedKeys.has(itemKey(type, key));
    }

    function selectedKeysForDrag(type, key) {
        const ik = itemKey(type, key);
        if (!selectedKeys.has(ik)) {
            selectedKeys = new Set([ik]);
            setSelectedFromKey(ik);
            lastRangeAnchor = ik;
        }
        return Array.from(selectedKeys);
    }

    function bindDraggable(label, type, key) {
        label.attr('draggable', true);
        label.on('dragstart', function(e) {
            const keys = selectedKeysForDrag(type, key);
            dragState = { keys: keys };
            try { e.originalEvent.dataTransfer.setData('text/plain', JSON.stringify(dragState)); e.originalEvent.dataTransfer.effectAllowed = 'move'; } catch (err) {}
        });
        label.on('dragend', function() { dragState = null; $('.folders-drop-over').removeClass('folders-drop-over'); });
    }

    function bindDropTarget(label, targetPath) {
        label.on('dragover', function(e) {
            if (!dragState) { return; }
            e.preventDefault();
            try { e.originalEvent.dataTransfer.dropEffect = 'move'; } catch (err) {}
            label.addClass('folders-drop-over');
        });
        label.on('dragleave', function() { label.removeClass('folders-drop-over'); });
        label.on('drop', function(e) {
            if (!dragState) { return; }
            e.preventDefault();
            e.stopPropagation();
            label.removeClass('folders-drop-over');
            moveDragItemsTo(targetPath);
        });
    }

    function flowPassesFilter(flow) {
        const isSubflow = flow && (flow.type === 'subflow' || flow._foldersKind === 'subflow');
        if (filterMode === 'flows') { return !isSubflow; }
        if (filterMode === 'subflows') { return isSubflow; }
        if (filterMode === 'hidden') { return isHidden(flow); }
        if (filterMode === 'shown') { return !isHidden(flow); }
        if (filterMode === 'disabled') { return isDisabled(flow); }
        if (filterMode === 'enabled') { return !isDisabled(flow); }
        if (filterMode === 'locked') { return isLocked(flow); }
        if (filterMode === 'unlocked') { return !isLocked(flow); }
        return true;
    }

    function countNodes(flow) {
        let count = 0;
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.z === flow.id) { count++; } }); } } catch (err) {}
        return count;
    }

    function countSubflowInstances(subflow) {
        if (!subflow || !subflow.id) { return 0; }
        let count = 0;
        const typeName = 'subflow:' + subflow.id;
        try { if (RED.nodes && typeof RED.nodes.eachNode === 'function') { RED.nodes.eachNode(function(node) { if (node && node.type === typeName) { count++; } }); } } catch (err) {}
        return count;
    }

    function compareFlows(a, b) {
        let result = 0;
        if (sortMode === 'created' || sortMode === 'updated') {
            const aStore = a && (a.type === 'subflow' || a._foldersKind === 'subflow') ? itemStore('subflow')[a.id] : itemStore('flow')[a && a.id];
            const bStore = b && (b.type === 'subflow' || b._foldersKind === 'subflow') ? itemStore('subflow')[b.id] : itemStore('flow')[b && b.id];
            const aValue = String((aStore && aStore[sortMode + 'At']) || '');
            const bValue = String((bStore && bStore[sortMode + 'At']) || '');
            result = aValue.localeCompare(bValue);
        } else if (sortMode === 'type') {
            const aType = a && (a.type === 'subflow' || a._foldersKind === 'subflow') ? 'subflow' : 'flow';
            const bType = b && (b.type === 'subflow' || b._foldersKind === 'subflow') ? 'subflow' : 'flow';
            result = aType.localeCompare(bType) || String(getLabel(a) || '').localeCompare(String(getLabel(b) || ''), undefined, { sensitivity: 'base' });
        } else {
            result = String(getLabel(a) || '').localeCompare(String(getLabel(b) || ''), undefined, { sensitivity: 'base' });
        }
        return sortDir === 'desc' ? -result : result;
    }

    function ensureFolder(rootNode, path) {
        let cursor = rootNode;
        const clean = normalisePath(path);
        if (!clean) { return cursor; }
        clean.split('/').forEach(part => {
            const nextPath = cursor.path ? cursor.path + '/' + part : part;
            if (!cursor.folders[part]) { cursor.folders[part] = { name: part, path: nextPath, folders: {}, flows: [] }; }
            cursor = cursor.folders[part];
        });
        return cursor;
    }

    function buildModel(flows, search, subflows) {
        const rootNode = { name: '', path: '', folders: {}, flows: [] };
        const q = String(search || '').trim().toLowerCase();
        if (filterMode === 'all' && !q) { loadEmptyFolders().forEach(path => ensureFolder(rootNode, path)); }
        flows.forEach(flow => {
            const path = getPath(flow);
            const label = getLabel(flow);
            const haystack = `${label} ${path} ${getInfo(flow)}`.toLowerCase();
            if (q && haystack.indexOf(q) === -1) { return; }
            if (!flowPassesFilter(flow)) { return; }
            ensureFolder(rootNode, path).flows.push(flow);
        });
        (subflows || []).forEach(subflow => {
            const path = getItemPath('subflow', subflow);
            const label = getLabel(subflow);
            const haystack = `${label} ${path} ${getInfo(subflow)}`.toLowerCase();
            if (q && haystack.indexOf(q) === -1) { return; }
            if (!flowPassesFilter(subflow)) { return; }
            ensureFolder(rootNode, path).flows.push(Object.assign(subflow, { _foldersKind: 'subflow' }));
        });
        return rootNode;
    }

    function buildSubflowModel(subflows, search) {
        const rootNode = { name: '', path: '', folders: {}, flows: [] };
        const q = String(search || '').trim().toLowerCase();
        if (!q) { loadEmptyFoldersForKind('subflow').forEach(path => ensureFolder(rootNode, path)); }
        subflows.forEach(subflow => {
            const path = getItemPath('subflow', subflow);
            const label = getLabel(subflow);
            const haystack = `${label} ${path} ${getInfo(subflow)}`.toLowerCase();
            if (q && haystack.indexOf(q) === -1) { return; }
            ensureFolder(rootNode, path).flows.push(subflow);
        });
        return rootNode;
    }

    function folderHasContent(folder) { return folder.flows.length > 0 || Object.keys(folder.folders).length > 0; }

    function normaliseConfig(value) {
        const clean = { version: 1, folders: {}, flows: {}, subflowFolders: {}, subflows: {}, updatedAt: value && value.updatedAt ? value.updatedAt : '' };
        if (value && typeof value === 'object') {
            const folders = value.folders && typeof value.folders === 'object' ? value.folders : {};
            Object.keys(folders).forEach(function(key) {
                const input = folders[key] || {};
                const p = normalisePath(input.path || key);
                if (!p) { return; }
                const parts = p.split('/');
                const parent = parts.slice(0, -1).join('/');
                clean.folders[p] = {
                    path: storedPath(p),
                    name: input.name || parts[parts.length - 1],
                    parent: storedPath(parent),
                    createdAt: input.createdAt || nowIso(),
                    updatedAt: input.updatedAt || nowIso(),
                    color: input.color || '',
                    icon: input.icon || DEFAULT_FOLDER_ICON,
                    files: Array.isArray(input.files) ? input.files.filter(Boolean) : [],
                    folders: Array.isArray(input.folders) ? input.folders.filter(Boolean) : []
                };
            });
            const flowSource = value.flows && typeof value.flows === 'object' ? value.flows : (value.flowPaths && typeof value.flowPaths === 'object' ? value.flowPaths : {});
            Object.keys(flowSource).forEach(function(id) {
                const input = flowSource[id];
                let path = '';
                let name = '';
                if (typeof input === 'string') { path = input; }
                else if (input && typeof input === 'object') { path = input.path || input.dir || ''; name = input.name || ''; }
                clean.flows[id] = {
                    id: id,
                    name: name,
                    path: storedPath(path),
                    icon: input && input.icon ? input.icon : '',
                    color: input && input.color ? input.color : '',
                    createdAt: input && input.createdAt ? input.createdAt : (input && input.updatedAt ? input.updatedAt : nowIso()),
                    updatedAt: input && input.updatedAt ? input.updatedAt : nowIso()
                };
            });
            const subflowFolders = value.subflowFolders && typeof value.subflowFolders === 'object' ? value.subflowFolders : {};
            Object.keys(subflowFolders).forEach(function(key) {
                const input = subflowFolders[key] || {};
                const p = normalisePath(input.path || key);
                if (!p) { return; }
                const parts = p.split('/');
                const parent = parts.slice(0, -1).join('/');
                clean.subflowFolders[p] = {
                    path: storedPath(p),
                    name: input.name || parts[parts.length - 1],
                    parent: storedPath(parent),
                    createdAt: input.createdAt || nowIso(),
                    updatedAt: input.updatedAt || nowIso(),
                    color: input.color || '',
                    icon: input.icon || DEFAULT_FOLDER_ICON,
                    files: Array.isArray(input.files) ? input.files.filter(Boolean) : [],
                    folders: Array.isArray(input.folders) ? input.folders.filter(Boolean) : []
                };
            });
            const subflowSource = value.subflows && typeof value.subflows === 'object' ? value.subflows : {};
            Object.keys(subflowSource).forEach(function(id) {
                const input = subflowSource[id];
                let path = '';
                let name = '';
                if (typeof input === 'string') { path = input; }
                else if (input && typeof input === 'object') { path = input.path || input.dir || ''; name = input.name || ''; }
                clean.subflows[id] = {
                    id: id,
                    name: name,
                    path: storedPath(path),
                    icon: input && input.icon ? input.icon : '',
                    color: input && input.color ? input.color : '',
                    createdAt: input && input.createdAt ? input.createdAt : (input && input.updatedAt ? input.updatedAt : nowIso()),
                    updatedAt: input && input.updatedAt ? input.updatedAt : nowIso()
                };
            });
        }
        return clean;
    }

    function loadConfig() {
        folderConfig = normaliseConfig(readGlobalFoldersConfig());
        configLoaded = true;
        syncStoreFromWorkspaces(false);
        render();
        return $.Deferred().resolve(folderConfig).promise();
    }

    function rebuildFolderIndexes() {
        folderConfig = normaliseConfig(folderConfig);
        Object.keys(folderConfig.folders).forEach(function(path) {
            folderConfig.folders[path].files = [];
            folderConfig.folders[path].folders = [];
        });
        Object.keys(folderConfig.flows).forEach(function(id) {
            const flow = findWorkspaceById(id);
            if (flow) { folderConfig.flows[id].name = getLabel(flow); }
            else { delete folderConfig.flows[id]; }
        });
        getWorkspaces().forEach(function(flow) {
            const p = getPath(flow);
            if (p) { ensureFolderRecord(p); }
            folderConfig.flows[flow.id] = Object.assign({}, folderConfig.flows[flow.id] || {}, {
                id: flow.id,
                name: getLabel(flow),
                path: storedPath(p),
                icon: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].icon ? folderConfig.flows[flow.id].icon : '',
                color: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].color ? folderConfig.flows[flow.id].color : '',
                createdAt: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].createdAt ? folderConfig.flows[flow.id].createdAt : nowIso(),
                updatedAt: folderConfig.flows[flow.id] && folderConfig.flows[flow.id].updatedAt ? folderConfig.flows[flow.id].updatedAt : nowIso()
            });
        });
        Object.keys(folderConfig.folders).forEach(function(path) {
            const parent = path.split('/').slice(0, -1).join('/');
            if (parent && folderConfig.folders[parent]) { folderConfig.folders[parent].folders.push(storedPath(path)); }
        });
        Object.keys(folderConfig.flows).forEach(function(id) {
            const p = normalisePath(folderConfig.flows[id].path);
            if (p) {
                ensureFolderRecord(p);

        if (kind === 'hidden') { return flows.every(isHidden); }
        if (kind === 'disabled') { return flows.every(isDisabled); }
        if (kind === 'locked') { return flows.every(isLocked); }

    function setFolderFlowState(path, kind) {
        const flows = folderStateItems(path, kind);
        if (!flows.length) { return; }
        const allActive = folderAllActive(path, kind);
        flows.forEach(function(flow) {
            const active = kind === 'hidden' ? isHidden(flow) : kind === 'disabled' ? isDisabled(flow) : isLocked(flow);

    function selectedStateTargets(clickedFlow, kind) {
        const clickedKey = flowKeyForState(clickedFlow);
        const keys = clickedKey && selectedKeys.has(clickedKey) ? Array.from(selectedKeys) : [clickedKey];
        const targets = [];
        const seen = new Set();

        function add(flow) {
            if (!flow || !flow.id || seen.has(flow.id)) { return; }
            if ((flow.type === 'subflow' || flow._foldersKind === 'subflow') && kind !== 'hidden') { return; }
            seen.add(flow.id);
            targets.push(flow);
        }

        keys.forEach(function(key) {
            if (!key) { return; }
            if (key.indexOf('folder:') === 0) { folderStateItems(key.slice(7), kind).forEach(add); return; }
            if (key.indexOf('flow:') === 0) { add(findWorkspaceById(key.slice(5))); return; }
            if (key.indexOf('subflow:') === 0 && kind === 'hidden') { add(findSubflowById(key.slice(8))); }
        });

        return targets.length ? targets : [clickedFlow].filter(Boolean);

    function renderFolder(list, folder, depth) {
        const hasContent = folderHasContent(folder);
        const isCollapsed = hasContent && collapsed.has(folder.path);
        const li = $('<li>').appendTo(list);
        const content = $('<div>', { class: 'red-ui-editableList-item-content' + (!isCollapsed ? ' expanded' : '') }).appendTo(li);
        visibleOrder.push(itemKey('folder', folder.path));
        const isSelected = isItemSelected('folder', folder.path);
        const meta = getFolderMeta(folder.path);
        const folderLevel = Math.max(0, depth - 1);
        const stateClasses = folderAllActive(folder.path, 'disabled') ? ' folders-disabled' : '';
        const label = labelBase(depth, !isCollapsed, isSelected, { level: folderLevel, hasToggle: true }).addClass(stateClasses).appendTo(content);
        const folderToggle = $('<span class="red-ui-treeList-icon folders-toggle">' + (hasContent ? '<i class="fa fa-angle-right"></i>' : '') + '</span>').appendTo(label);
        const folderIcon = $('<span>', { class: 'red-ui-treeList-icon' }).html(iconHtml(meta.icon || DEFAULT_FOLDER_ICON)).appendTo(label);
        if (meta.color) { applyIconColor(folderIcon.find('i'), meta.color); }
        if (editingFolderPath === folder.path) {
            const inputWidth = Math.max(38, Math.min(128, ((folder.name || 'New folder').length + 1) * 7));
            const input = $('<input>', { class: 'folders-inline-folder', type: 'text', value: folder.name }).css('width', inputWidth + 'px').appendTo(label);
            setTimeout(function(){ input.trigger('focus').trigger('select'); }, 0);
            let renameFinished = false;
            function commit() {
                if (renameFinished) { return; }
                renameFinished = true;
                const raw = String(input.val() || '').trim();
                const typed = normalisePath(raw).replace(/\//g, '') || 'New folder';
                const parent = folder.path.split('/').slice(0, -1).join('/');
                let finalPath = folder.path;
                if ((parent ? parent + '/' + typed : typed) !== folder.path) {
                    finalPath = moveFolderPath(folder.path, parent, typed);
                    if (isSelected) {
                        selected = { type: 'folder', path: finalPath };
                        selectedKeys = new Set([itemKey('folder', finalPath)]);
                    }
                    saveConfigNow();
                    markDirty();
                }
                editingFolderPath = null;
                editingFolderOriginal = null;
                render();
                if (isSelected) { forceInfoPanelUpdate(); }
            }
            function cancel() {
                if (renameFinished) { return; }
                renameFinished = true;
                if (editingFolderOriginal === null) { removeEmptyFolder(folder.path); }
                editingFolderPath = null; editingFolderOriginal = null; render();

    function render() {
        if (!tree) { return; }
        try {
            const flows = getWorkspaces();
            const subflows = getSubflows(false);
            const q = searchInput ? searchInput.val() : '';
            const model = buildModel(flows, q, subflows);
            tree.empty();
            visibleOrder = [];
            if (!folderHasContent(model)) { renderEmpty(tree, 0); }
            else { renderFolderList(tree, model, 1); }
            updateFooterButtons();
        } catch (err) { console.warn('Folders render failed; using simple list fallback.', err); renderSimpleFallback(); }
    }

    function renderSimpleFallback() {
        if (!tree) { return; }
        const flows = getWorkspaces();
        const q = String(searchInput ? searchInput.val() : '').trim().toLowerCase();
        tree.empty();
        visibleOrder = [];
        const subflows = getSubflows(false);
        if (flows.length === 0 && subflows.length === 0) {
            renderEmpty(tree, 0);
        } else {
            flows.forEach(flow => {
                const haystack = `${getLabel(flow)} ${getPath(flow)} ${getInfo(flow)}`.toLowerCase();
                if (q && haystack.indexOf(q) === -1) { return; }
                if (!flowPassesFilter(flow)) { return; }
                renderFlow(tree, flow, 0);
            });
            subflows.forEach(subflow => {
                const haystack = `${getLabel(subflow)} ${getItemPath('subflow', subflow)} ${getInfo(subflow)}`.toLowerCase();
                if (q && haystack.indexOf(q) === -1) { return; }
                if (!flowPassesFilter(subflow)) { return; }
                renderSubflow(tree, subflow, 0);
            });
        }
        updateFooterButtons();
    }

    function moveFolderPath(oldPath, newParent, newName) {
        const cleanOld = normalisePath(oldPath);
        const cleanParent = normalisePath(newParent);
        const cleanName = normalisePath(newName).replace(/\//g, '');
        if (!cleanOld || !cleanName) { return cleanOld; }
        const cleanNew = cleanParent ? cleanParent + '/' + cleanName : cleanName;
        if (cleanNew === cleanOld || cleanNew.indexOf(cleanOld + '/') === 0) { return cleanOld; }
        folderConfig = normaliseConfig(folderConfig);
        const nextFolders = {};
        Object.keys(folderConfig.folders).forEach(function(path) {
            let nextPath = path;
            if (path === cleanOld) { nextPath = cleanNew; }
            else if (path.indexOf(cleanOld + '/') === 0) { nextPath = cleanNew + path.slice(cleanOld.length); }
            const parts = nextPath.split('/');
            nextFolders[nextPath] = Object.assign({}, folderConfig.folders[path], {
                path: storedPath(nextPath),
                name: parts[parts.length - 1] || folderConfig.folders[path].name,
                parent: storedPath(parts.slice(0, -1).join('/')),
                updatedAt: nowIso()
            });
        });
        folderConfig.folders = nextFolders;
        scheduleConfigSave();
        getWorkspaces().forEach(flow => {
            const p = getPath(flow);
            if (p === cleanOld || p.indexOf(cleanOld + '/') === 0) { moveFlowTo(flow, cleanNew + p.slice(cleanOld.length)); }
        });
        moveSubflowFolderBranch(cleanOld, cleanNew);
        return cleanNew;
    }

    function moveSubflowFolderBranch(cleanOld, cleanNew) {
        const nextFolders = {};
        Object.keys(folderConfig.subflowFolders).forEach(function(path) {
            let nextPath = path;
            if (path === cleanOld) { nextPath = cleanNew; }
            else if (path.indexOf(cleanOld + '/') === 0) { nextPath = cleanNew + path.slice(cleanOld.length); }
            const parts = nextPath.split('/');
            nextFolders[nextPath] = Object.assign({}, folderConfig.subflowFolders[path], {
                path: storedPath(nextPath),
                name: parts[parts.length - 1] || folderConfig.subflowFolders[path].name,
                parent: storedPath(parts.slice(0, -1).join('/')),
                updatedAt: nowIso()
            });
        });
        folderConfig.subflowFolders = nextFolders;
        getSubflows(false).forEach(function(subflow) {
            const p = getItemPath('subflow', subflow);
            if (p === cleanOld || p.indexOf(cleanOld + '/') === 0) {
                moveSubflowTo(subflow, cleanNew + p.slice(cleanOld.length));
            }
        });
        scheduleConfigSave();
    }

    function moveFolderTo(oldPath, targetPath) {
        const cleanOld = normalisePath(oldPath);
        const cleanTarget = normalisePath(targetPath);

        if (!cleanOld || !name) { return cleanOld; }
        if (cleanTarget === cleanOld || cleanTarget.indexOf(cleanOld + '/') === 0) { notify('Cannot move a folder into itself.', 'warning'); return cleanOld; }
        return moveFolderPath(cleanOld, cleanTarget, name);

    function moveSubflowFolderTo(oldPath, targetPath) {

    function selectedFolderPathsFromKeys(keys) {
        return keys.filter(key => key.indexOf('folder:') === 0).map(key => normalisePath(key.slice(7))).filter(Boolean);
    }

    function selectedSubflowFolderPathsFromKeys(keys) {
        return keys.filter(key => key.indexOf('subflow-folder:') === 0).map(key => normalisePath(key.slice(15))).filter(Boolean);

    function flowIsInsideAnySelectedFolder(flow, folders) {
        const p = getPath(flow);

    function compactFolderSelection(paths) {
        const sorted = Array.from(new Set(paths)).sort((a,b) => a.length - b.length);
        return sorted.filter(path => !sorted.some(other => other !== path && path.indexOf(other + '/') === 0));
    }

    function moveKeysTo(keys, targetPath) {
        const isSubflowTarget = String(targetPath || '').indexOf('subflow:') === 0;
        const cleanTarget = normalisePath(isSubflowTarget ? String(targetPath || '').slice(8) : targetPath);
        const keyList = Array.from(new Set(keys || []));
        if (isSubflowTarget) {
            const folderPaths = compactFolderSelection(selectedSubflowFolderPathsFromKeys(keyList));
            const newKeys = [];
            folderPaths.forEach(path => {
                const newPath = moveSubflowFolderTo(path, cleanTarget);
                newKeys.push(itemKey('subflow-folder', newPath));
            });
            keyList.forEach(key => {
                if (key.indexOf('subflow:') !== 0) { return; }
                const subflow = findSubflowById(key.slice(8));
                if (!subflow) { return; }
                const p = getItemPath('subflow', subflow);
